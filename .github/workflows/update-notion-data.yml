name: Update Notion Data

on:
  schedule:
    # 3시간마다 실행 (00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00 UTC)
    - cron: '0 */3 * * *'
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write  # 파일 수정 및 커밋 권한

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Create data directory
      run: |
        mkdir -p data

    - name: Fetch Cohort Management data
      run: |
        HTTP_STATUS=$(curl -s -w "%{http_code}" -o cohort-raw.json -X POST "https://api.notion.com/v1/databases/23787a1932c481bba2c1d5f33256cc37/query" \
          -H "Authorization: Bearer ${{ secrets.NOTION_API_KEY }}" \
          -H "Notion-Version: 2022-06-28" \
          -H "Content-Type: application/json" \
          -d '{
            "page_size": 50
          }')

        echo "HTTP Status: $HTTP_STATUS"

        if [ "$HTTP_STATUS" != "200" ]; then
          echo "❌ Cohort Management API 오류 (HTTP $HTTP_STATUS):"
          cat cohort-raw.json
          exit 1
        fi

        echo "✅ Cohort Management API 호출 성공"

    - name: Fetch Lecture Management data
      run: |
        HTTP_STATUS=$(curl -s -w "%{http_code}" -o lecture-raw.json -X POST "https://api.notion.com/v1/databases/6f892938f4884cd0ba09b858e500e025/query" \
          -H "Authorization: Bearer ${{ secrets.NOTION_API_KEY }}" \
          -H "Notion-Version: 2022-06-28" \
          -H "Content-Type: application/json" \
          -d '{
            "page_size": 100
          }')

        echo "HTTP Status: $HTTP_STATUS"

        if [ "$HTTP_STATUS" != "200" ]; then
          echo "❌ Lecture Management API 오류 (HTTP $HTTP_STATUS):"
          cat lecture-raw.json
          exit 1
        fi

        echo "✅ Lecture Management API 호출 성공"

    - name: Transform Cohort + Lecture data to schedule.json
      run: |
        node -e "
        const fs = require('fs');

        // ===== 1. Cohort Management 데이터 로드 =====
        let cohortRaw;
        try {
          cohortRaw = JSON.parse(fs.readFileSync('cohort-raw.json', 'utf8'));
        } catch (e) {
          console.error('❌ Cohort JSON 파싱 오류:', e.message);
          process.exit(1);
        }

        if (cohortRaw.object === 'error') {
          console.error('❌ Cohort API 오류:', cohortRaw.message);
          process.exit(1);
        }

        if (!cohortRaw.results || !Array.isArray(cohortRaw.results)) {
          console.error('❌ 유효하지 않은 Cohort 응답 형식');
          process.exit(1);
        }

        // ===== 2. Lecture Management 데이터 로드 =====
        let lectureRaw;
        try {
          lectureRaw = JSON.parse(fs.readFileSync('lecture-raw.json', 'utf8'));
        } catch (e) {
          console.error('❌ Lecture JSON 파싱 오류:', e.message);
          process.exit(1);
        }

        if (lectureRaw.object === 'error') {
          console.error('❌ Lecture API 오류:', lectureRaw.message);
          process.exit(1);
        }

        console.log('📊 Cohort: ' + cohortRaw.results.length + '개 기수');
        console.log('📊 Lecture: ' + (lectureRaw.results?.length || 0) + '개 세션');

        // ===== 3. Cohort 메타데이터 맵 구축 (ID → 기수 정보) =====
        const cohortMap = {};
        cohortRaw.results.forEach((course, index) => {
          if (course.archived || course.in_trash) return;
          const props = course.properties;
          const title = props.기수명?.title?.[0]?.text?.content || \`강의 \${index + 1}\`;
          const category = props.강의종류?.select?.name || 'SCM 기초';
          const status = props.상태?.select?.name || '준비중';
          const description = props.비고?.rich_text?.[0]?.text?.content || '';
          const price = props.수강료?.number || 0;
          const maxStudents = props.최대인원?.number || 20;
          const currentStudents = props.현재등록인원?.number || 0;
          let batch = props.기수?.number;
          if (!batch) {
            const batchMatch = title.match(/(\\d+)기/);
            batch = batchMatch ? parseInt(batchMatch[1]) : (index + 1);
          }
          cohortMap[course.id] = {
            id: course.id, title, category, status, description,
            price, maxStudents, currentStudents, batch
          };
          console.log(\`  ✓ 기수 등록: \${title} (\${batch}기, ID: \${course.id.substring(0,8)}...)\`);
        });

        // ===== 4. Lecture 데이터 → calendarData 변환 =====
        const calendarData = [];

        if (lectureRaw.results && lectureRaw.results.length > 0) {
          lectureRaw.results.forEach((lecture, idx) => {
            if (lecture.archived || lecture.in_trash) return;
            const p = lecture.properties;

            const lectureName = p.강의명?.title?.[0]?.text?.content || '';
            const lectureDate = p.강의일시?.date?.start;
            const weekNum = p.주차?.number || 0;
            const lectureType = p.유형?.select?.name || '';
            const cohortRelation = p.기수?.relation?.[0]?.id || '';

            if (!lectureDate) return;

            // Cohort 메타데이터 조회
            const cohort = cohortMap[cohortRelation] || {
              id: cohortRelation, title: lectureName.split(' - ')[0] || '알 수 없음',
              category: 'SCM 기초', status: '준비중', description: '',
              price: 0, maxStudents: 20, currentStudents: 0, batch: 0
            };

            // 유형 + 주차 → week, label, type 매핑
            let overallWeek, label, type, hasAssignment;
            if (lectureType === '강의') {
              type = 'lecture';
              overallWeek = weekNum * 2 - 1;
              hasAssignment = weekNum < 3;
              if (weekNum === 1) label = '1주차 강의';
              else if (weekNum === 2) label = '3주차 강의';
              else if (weekNum === 3) label = '5주차 최종발표';
              else label = \`\${overallWeek}주차 강의\`;
            } else if (lectureType === '과제세션') {
              type = 'assignment';
              overallWeek = weekNum * 2;
              hasAssignment = true;
              if (weekNum === 1) label = '2주차 피드백';
              else if (weekNum === 2) label = '4주차 피드백';
              else label = \`\${overallWeek}주차 피드백\`;
            } else {
              type = 'lecture';
              overallWeek = weekNum;
              label = \`\${weekNum}주차\`;
              hasAssignment = false;
            }

            calendarData.push({
              name: cohort.title,
              date: lectureDate,
              type,
              week: overallWeek,
              label,
              hasAssignment,
              status: cohort.status,
              batch: cohort.batch,
              maxStudents: cohort.maxStudents,
              currentStudents: cohort.currentStudents,
              notionData: cohort
            });

            console.log(\`  📅 \${lectureName} → \${lectureDate} (week \${overallWeek}, \${type})\`);
          });

          console.log(\`\n✅ Lecture Management에서 \${calendarData.length}개 세션 변환 완료\`);
        } else {
          // Lecture Management 데이터가 없으면 Cohort의 날짜 필드로 폴백
          console.log('⚠️  Lecture 데이터 없음 → Cohort 날짜 필드로 폴백');
          Object.values(cohortMap).forEach(cohort => {
            const course = cohortRaw.results.find(r => r.id === cohort.id);
            if (!course) return;
            const props = course.properties;

            const dates = [
              { key: '강의(1)', week: 1, type: 'lecture', label: '1주차 강의', hasAssignment: true },
              { key: '과제세션(1)', week: 2, type: 'assignment', label: '2주차 피드백', hasAssignment: true },
              { key: '강의(2)', week: 3, type: 'lecture', label: '3주차 강의', hasAssignment: true },
              { key: '과제세션(2)', week: 4, type: 'assignment', label: '4주차 피드백', hasAssignment: true },
              { key: '강의(3)', week: 5, type: 'lecture', label: '5주차 최종발표', hasAssignment: false }
            ];
            dates.forEach(d => {
              const date = props[d.key]?.date?.start;
              if (date) {
                calendarData.push({
                  name: cohort.title, date, type: d.type, week: d.week,
                  label: d.label, hasAssignment: d.hasAssignment,
                  status: cohort.status, batch: cohort.batch,
                  maxStudents: cohort.maxStudents, currentStudents: cohort.currentStudents,
                  notionData: cohort
                });
              }
            });
          });
          console.log(\`✅ Cohort 폴백으로 \${calendarData.length}개 세션 변환 완료\`);
        }

        calendarData.sort((a, b) => new Date(a.date) - new Date(b.date));

        const output = {
          success: true,
          data: calendarData,
          lastUpdated: new Date().toISOString(),
          totalSessions: calendarData.length
        };

        fs.writeFileSync('data/schedule.json', JSON.stringify(output, null, 2));
        console.log(\`✅ 최종 \${calendarData.length}개 세션 → data/schedule.json 저장 완료\`);
        "

    - name: Fetch Reviews from Notion (with pagination)
      run: |
        node -e "
        const https = require('https');
        const fs = require('fs');

        const NOTION_API_KEY = process.env.NOTION_API_KEY;
        const DATABASE_ID = '243951127368492d906a3d36861aacd2';

        async function fetchAllPages() {
          let allResults = [];
          let hasMore = true;
          let startCursor = null;
          let pageNum = 1;

          console.log('🔄 Notion Reviews 데이터 페이지네이션 시작...\n');

          while (hasMore) {
            console.log('📄 페이지 ' + pageNum + ' 요청 중...');

            const requestBody = {
              page_size: 100
            };

            if (startCursor) {
              requestBody.start_cursor = startCursor;
            }

            const data = await makeRequest(requestBody);

            if (data.object === 'error') {
              console.error('❌ Notion API 오류:', data.message);
              process.exit(1);
            }

            const pageResults = data.results || [];
            allResults = allResults.concat(pageResults);

            console.log('   ✓ ' + pageResults.length + '개 후기 수신 (누적: ' + allResults.length + '개)');

            hasMore = data.has_more || false;
            startCursor = data.next_cursor || null;
            pageNum++;

            if (hasMore && startCursor) {
              console.log('   → 다음 페이지 존재, 계속 진행...\n');
            }
          }

          console.log('\n✅ 총 ' + allResults.length + '개 후기 수집 완료 (' + (pageNum - 1) + '페이지)\n');

          return {
            results: allResults,
            total: allResults.length
          };
        }

        function makeRequest(body) {
          return new Promise((resolve, reject) => {
            const bodyStr = JSON.stringify(body);

            const options = {
              hostname: 'api.notion.com',
              path: '/v1/databases/' + DATABASE_ID + '/query',
              method: 'POST',
              headers: {
                'Authorization': 'Bearer ' + NOTION_API_KEY,
                'Notion-Version': '2022-06-28',
                'Content-Type': 'application/json',
                'Content-Length': Buffer.byteLength(bodyStr)
              }
            };

            const req = https.request(options, (res) => {
              let data = '';

              res.on('data', (chunk) => {
                data += chunk;
              });

              res.on('end', () => {
                if (res.statusCode !== 200) {
                  console.error('❌ HTTP ' + res.statusCode + ':');
                  console.error(data);
                  reject(new Error('HTTP ' + res.statusCode));
                  return;
                }

                try {
                  resolve(JSON.parse(data));
                } catch (e) {
                  reject(e);
                }
              });
            });

            req.on('error', (e) => {
              reject(e);
            });

            req.write(bodyStr);
            req.end();
          });
        }

        fetchAllPages()
          .then(data => {
            fs.writeFileSync('reviews-raw.json', JSON.stringify(data, null, 2));
            console.log('💾 reviews-raw.json 저장 완료');
          })
          .catch(err => {
            console.error('❌ 오류:', err.message);
            process.exit(1);
          });
        "
      env:
        NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}

    - name: Transform reviews data
      run: |
        node -e "
        const fs = require('fs');

        let rawData;
        try {
          rawData = JSON.parse(fs.readFileSync('reviews-raw.json', 'utf8'));
        } catch (e) {
          console.error('❌ Reviews JSON 파싱 오류:', e.message);
          process.exit(1);
        }

        if (rawData.object === 'error') {
          console.error('❌ Notion API 오류:', rawData.message);
          process.exit(1);
        }

        if (!rawData.results || !Array.isArray(rawData.results)) {
          console.error('❌ 유효하지 않은 응답 형식');
          process.exit(1);
        }

        console.log('📊 총 ' + rawData.results.length + '개 후기 발견');

        const reviews = [];

        rawData.results.forEach((review, index) => {
          if (review.archived || review.in_trash) return;

          const props = review.properties;

          // 모든 후기의 속성 확인을 위한 디버깅 강화
          console.log('\\n📋 후기 #' + (index + 1) + ' 속성:');
          Object.keys(props).forEach(key => {
            const prop = props[key];
            let value = '(empty)';
            if (prop.type === 'title' && prop.title?.[0]) {
              value = prop.title[0].text?.content || prop.title[0].plain_text || '';
            } else if (prop.type === 'rich_text' && prop.rich_text?.[0]) {
              value = prop.rich_text[0].text?.content || prop.rich_text[0].plain_text || '';
            } else if (prop.type === 'number') {
              value = prop.number;
            } else if (prop.type === 'select' && prop.select) {
              value = prop.select.name;
            }
            console.log('  - ' + key + ' (' + prop.type + '): ' + value);
          });

          // 후기 제목 추출
          let title = '';
          if (props['후기 제목']?.title?.[0]) {
            title = props['후기 제목'].title[0].text?.content || props['후기 제목'].title[0].plain_text || '';
          }

          // 후기 내용 추출 (다양한 필드명 시도)
          let content = '';
          const contentFields = ['후기 내용', '후기내용', '후기', '내용', 'content', 'Content', 'Review'];
          for (const field of contentFields) {
            const prop = props[field];
            if (prop?.rich_text?.[0]) {
              content = prop.rich_text[0].text?.content || prop.rich_text[0].plain_text || '';
              if (content) break;
            }
            if (prop?.title?.[0]) {
              content = prop.title[0].text?.content || prop.title[0].plain_text || '';
              if (content) break;
            }
          }

          // 제목이 있지만 내용이 없으면 제목을 내용으로 사용
          if (!content && title) {
            content = title;
          }

          // 별점 추출 - 더 많은 필드명 지원
          let rating = 5;
          let ratingFound = false;
          const ratingFields = ['별점', 'rating', 'Rating', '평점', '점수', 'Score', 'Stars', '만족도'];

          // 별점 파싱 함수 (다양한 포맷 지원)
          function parseRating(rawValue) {
            if (!rawValue) return null;

            const str = String(rawValue).trim();
            console.log('    [DEBUG] 원본 값: [' + str + ']');

            // 1. 숫자만 있는 경우: 5, 4, 3 등
            const numOnly = parseInt(str);
            if (!isNaN(numOnly) && numOnly >= 1 && numOnly <= 5) {
              console.log('    [OK] 숫자 파싱 성공: ' + numOnly);
              return numOnly;
            }

            // 2. N점 형식: 5점, 4점, 3점 등
            const matchPoints = str.match(/^(\d+)점?$/);
            if (matchPoints) {
              const num = parseInt(matchPoints[1]);
              if (num >= 1 && num <= 5) {
                console.log('    [OK] N점 파싱 성공: ' + num);
                return num;
              }
            }

            // 3. 별 개수 세기
            const starCount = (str.match(/[★⭐]/g) || []).length;
            if (starCount >= 1 && starCount <= 5) {
              console.log('    [OK] 별 개수 파싱 성공: ' + starCount);
              return starCount;
            }

            // 4. 한글 만족도 매핑
            const satisfactionMap = {
              '매우만족': 5, '매우 만족': 5, '최고': 5, '아주좋음': 5,
              '만족': 4, '좋음': 4,
              '보통': 3, '괜찮음': 3,
              '불만족': 2, '아쉬움': 2,
              '매우불만족': 1, '매우 불만족': 1
            };
            const lowerStr = str.toLowerCase();
            for (const [key, value] of Object.entries(satisfactionMap)) {
              if (lowerStr.includes(key.toLowerCase())) {
                console.log('    [OK] 만족도 매핑: ' + key + ' = ' + value);
                return value;
              }
            }

            console.log('    [WARN] 파싱 실패 - 기본값 5로 설정');
            return null;
          }

          for (const field of ratingFields) {
            if (props[field]?.number) {
              rating = props[field].number;
              console.log('  → 별점 필드 발견 (number): ' + field + ' = ' + rating);
              ratingFound = true;
              break;
            }
            if (props[field]?.select?.name) {
              const ratingStr = props[field].select.name;
              console.log('  → 별점 필드 발견 (select): ' + field);
              const parsed = parseRating(ratingStr);
              if (parsed !== null) {
                rating = parsed;
                ratingFound = true;
                break;
              }
            }
            if (props[field]?.rich_text?.[0]) {
              const ratingStr = props[field].rich_text[0].text?.content || props[field].rich_text[0].plain_text || '';
              if (ratingStr) {
                console.log('  → 별점 필드 발견 (rich_text): ' + field);
                const parsed = parseRating(ratingStr);
                if (parsed !== null) {
                  rating = parsed;
                  ratingFound = true;
                  break;
                }
              }
            }
          }

          if (!ratingFound) {
            console.log('  [WARN] 별점 필드를 찾지 못함 - 기본값 5 사용');
          }
          console.log('  - 최종 별점: ' + rating);

          // 작성자 추출 (익명작성자 필드 우선 사용)
          let author = '';
          const authorFields = ['익명작성자', '익명 작성자', '작성자', '이름', 'author', 'Author', 'Name'];
          for (const field of authorFields) {
            const prop = props[field];
            if (prop?.rich_text?.[0]) {
              author = prop.rich_text[0].text?.content || prop.rich_text[0].plain_text || '';
              if (author) break;
            }
            if (prop?.title?.[0]) {
              author = prop.title[0].text?.content || prop.title[0].plain_text || '';
              if (author) break;
            }
          }

          // 날짜 추출
          let date = '';
          const dateFields = ['작성일자', '날짜', '작성일', 'date', 'Date', '등록일'];
          for (const field of dateFields) {
            if (props[field]?.date?.start) {
              const d = new Date(props[field].date.start);
              date = d.getFullYear() + '.' + String(d.getMonth() + 1).padStart(2, '0');
              break;
            }
          }

          // 생성일 fallback
          if (!date && review.created_time) {
            const d = new Date(review.created_time);
            date = d.getFullYear() + '.' + String(d.getMonth() + 1).padStart(2, '0');
          }

          // 카테고리 추출 (컨설팅/부트캠프 구분) - 더 많은 필드명 지원
          let category = 'bootcamp';
          const categoryFields = ['서비스 종류', '서비스종류', '프로그램', '카테고리', 'category', 'Category', '유형', '종류', '타입', 'Type', '서비스', 'Service'];
          for (const field of categoryFields) {
            if (props[field]?.select?.name) {
              const catName = props[field].select.name.toLowerCase();
              console.log('  → 카테고리 필드 발견: ' + field + ' = ' + catName);
              if (catName.includes('컨설팅') || catName.includes('consulting') || catName.includes('1:1') || catName.includes('1대1') || catName.includes('커리어') || catName.includes('career')) {
                category = 'consulting';
              } else if (catName.includes('부트') || catName.includes('bootcamp') || catName.includes('boot') || catName.includes('scm') || catName.includes('직무')) {
                category = 'bootcamp';
              }
              break;
            }
            // rich_text 타입도 확인
            if (props[field]?.rich_text?.[0]) {
              const catName = (props[field].rich_text[0].text?.content || props[field].rich_text[0].plain_text || '').toLowerCase();
              if (catName) {
                console.log('  → 카테고리 필드 발견 (rich_text): ' + field + ' = ' + catName);
                if (catName.includes('컨설팅') || catName.includes('consulting') || catName.includes('1:1') || catName.includes('1대1') || catName.includes('커리어') || catName.includes('career')) {
                  category = 'consulting';
                } else if (catName.includes('부트') || catName.includes('bootcamp') || catName.includes('boot') || catName.includes('scm') || catName.includes('직무')) {
                  category = 'bootcamp';
                }
                break;
              }
            }
          }
          console.log('  → 최종 카테고리: ' + category);

          if (content) {
            reviews.push({
              id: review.id,
              title: title,
              content: content,
              rating: rating,
              author: author,
              date: date,
              category: category
            });
            console.log('✓ 후기 추가: ' + author + ' (' + rating + '점, ' + category + ')');
          } else {
            const excludeMsg = '✗ 후기 제외 (내용 없음): ID=' + review.id + ', 카테고리=' + category + ', 작성자=' + (author || '(없음)') + ', 별점=' + rating;
            console.log(excludeMsg);
            console.log('  [INFO] 후기 내용 필드를 확인하세요.');
          }
        });

        // 날짜 역순 정렬 (최신순)
        reviews.sort((a, b) => {
          if (!a.date) return 1;
          if (!b.date) return -1;
          return b.date.localeCompare(a.date);
        });

        // 통계 분석
        console.log('\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
        console.log('📊 후기 데이터 통계');
        console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n');

        const categoryStats = {};
        const ratingStats = {};
        reviews.forEach(r => {
          categoryStats[r.category] = (categoryStats[r.category] || 0) + 1;
          ratingStats[r.rating] = (ratingStats[r.rating] || 0) + 1;
        });

        console.log('카테고리별 분포:');
        Object.entries(categoryStats).forEach(([cat, count]) => {
          console.log('  - ' + cat + ': ' + count + '개');
        });

        console.log('\n평점별 분포:');
        Object.entries(ratingStats).sort((a, b) => b[0] - a[0]).forEach(([rating, count]) => {
          console.log('  - ' + rating + '점: ' + count + '개');
        });

        const lowRatingCount = reviews.filter(r => r.rating < 5).length;
        console.log('\n✓ 총 후기: ' + reviews.length + '개');
        console.log('✓ 1대1컨설팅: ' + (categoryStats.consulting || 0) + '개');
        console.log('✓ 4점 이하: ' + lowRatingCount + '개');

        if (!categoryStats.consulting || categoryStats.consulting === 0) {
          console.log('\\n[WARNING] 1대1컨설팅 후기가 없습니다!');
          console.log('   - Notion의 프로그램 필드 확인 필요');
        }

        if (lowRatingCount === 0) {
          console.log('\\n[WARNING] 4점 이하 후기가 없습니다!');
          console.log('   - Notion의 별점 필드 값 확인 필요');
          console.log('   - 위 로그에서 원본 값 확인');
        }

        console.log('\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n');

        const output = {
          success: true,
          data: reviews,
          lastUpdated: new Date().toISOString(),
          totalReviews: reviews.length
        };

        fs.writeFileSync('data/reviews.json', JSON.stringify(output, null, 2));
        console.log('✅ ' + reviews.length + '개 후기 데이터 업데이트 완료');
        "

    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/schedule.json data/reviews.json
        if ! git diff --cached --exit-code; then
          git commit -m "🔄 Notion 데이터 자동 업데이트 $(date '+%Y-%m-%d %H:%M')"
          git push
        else
          echo "데이터 변경사항 없음"
        fi
